<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rezgian</title>

<style>
body {
    padding: 0;
    margin: 0;
    padding-left: 3vh;
    padding-top: 3vh;
}

/* Outer frame */
#container {
    border-left: 2.5vh solid #614727;  /* left bevel */
    border-top: 2.5vh solid #8a6537;   /* top bevel */
    padding: 0;                        /* keeps bevel tight */
}

/* Inner shadow */
#Main {
    background: #f7b15b;
    padding: 20vh;

    /* space for the shadow tile */
    border-top: 2.5vh solid transparent;
    border-left: 2.5vh solid transparent;

    /* inner shadow tile */
    border-image-source: url("https://i.imgur.com/180H0IG.png");
    border-image-slice: 13;
    border-image-repeat: stretch;
}
</style>

</head>

<body>
<div id="container">
    <div id="Main">
        <img src="static/images/Background.jpg" alt="Background" style="width: 100%; height: auto;">
        Welcome to Rezgian<br><br>
        A cozy tavern where adventurers gather to share tales and embark on quests.<br>
        A world of stories, characters, and quiet magic.<br><br>
        Click <a href="https://rezgian.online/room/tavern" style="color: #eee; text-decoration: underline;">here</a> to enter the tavern.
    </div>
</div>
</body>
</html>
