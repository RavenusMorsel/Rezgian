<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ room.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/app/static/css/room.css">  <!-- keep if needed -->

</head>
<body style="background: url('{{ room.background }}') center/cover no-repeat;">
            {% if room.exits %}
        <aside id="exits-panel" aria-label="Room exits">
           {% for exit_name, target_room in room.exits.items() %}
            <a class="exit-button" href="/room/{{ target_room }}">{{ exit_name | replace('_', ' ') | title }}</a>
            {% endfor %}
        </aside>
        {% endif %}

<div id="container">
    <div id="Main">

        <header>
            <div id="room-title">{{ room.name }}</div>
            <div id="character-meta">
                <div id="active-character">Not signed in</div>
                <div id="coin-display">Coins: 0</div>
            </div>
        </header>

        <button id="shop-toggle" type="button" class="pullout-toggle" hidden>Shop</button>
        <aside id="shop-panel" class="pullout-drawer top" hidden>
            <div class="econ-title">Tavern Counter</div>
            <div id="shop-items"></div>
        </aside>

        <button id="inventory-toggle" type="button" class="pullout-toggle bottom">Pack</button>
        <aside id="inventory-panel" class="pullout-drawer bottom" hidden>
            <div class="econ-title">Inventory</div>
            <div id="inventory-items">Empty pack</div>
        </aside>

        <div id="chat-wrapper">
            <div id="chat-container">
                <div id="chat-log"></div>

                <div id="chat-inputs">
                    <button id="action-toggle" type="button" title="Toggle action (/me)">*</button>
                    <input id="message" placeholder="Type your message..." autocomplete="off">
                    <button id="send-button" type="button" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <footer>
            <div id="room-description">
                {{ room.description }}
                <button id="ambience-toggle">♪</button>
            </div>
        </footer>

    </div>
</div>

<script>
    const roomId = "{{ room.id }}";
    const roomAudio = {{ room.audio | tojson }};
</script>

<script src="/app/static/js/chat.js"></script>

</body>
</html>
