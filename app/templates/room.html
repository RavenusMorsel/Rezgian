<!DOCTYPE html>
<html>
<head>
    <title>{{ room.name }}</title>
    <link rel="stylesheet" href="/app/static/css/room.css">
</head>

<body style="background-image: url('{{ room.background }}');">
<div id=header>
    <button id="ambience-toggle">Ambience: Off</button>
    <div id="room-title">{{ room.name }}</div>
    <div id="room-description">{{ room.description }}</div>
</div>
    <div id="chat-container">
        <div id="chat-log"
             style="background-color: {{ room.logbg }}; overflow-y: scroll; padding: 10px;">
        </div>

        <input id="username" placeholder="Name" style="width: 100%; margin-top: 10px;">
        <input id="message" placeholder="Message" style="width: 100%; margin-top: 5px;">

        <button onclick="sendMessage()" style="width: 100%; margin-top: 5px;">Send</button>
    </div>

    <script>
        const roomId = "{{ room.id }}";
        const roomAudio = {{ room.audio | tojson }};
    </script>

    <!-- Only ONE chat script, the correct one -->
    <script src="/app/static/js/chat.js"></script>

</body>
</html>
