<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ room.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/app/static/css/room.css">  <!-- keep if you have extra styles -->
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #2c1e0f url('{{ room.background }}') center/cover no-repeat;
            font-family: 'Georgia', serif;
            color: #fffdf7;
        }

        #container {
            position: fixed;
            inset: 2vh 3vw;           /* smaller side margins on wide screens */
            border: 2.5vh solid transparent;
            border-left-color: #614727;
            border-top-color:  #8a6537;
            border-right-color: #614727;
            border-bottom-color:#8a6537;
            border-image-source: url("https://i.imgur.com/180H0IG.png");
            border-image-slice: 18;   /* bumped up a bit — test 14–24 depending on your image */
            border-image-repeat: stretch;
            box-shadow: -0.8vh 0.8vh 18px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #Main {
            flex: 1;
            background: #f7b15b;
            border: 2.5vh solid transparent;
            border-image-source: url("https://i.imgur.com/R5LcgFz.png");
            border-image-slice: 18;   /* adjust 14–24 if corners look off */
            border-image-repeat: stretch;
            padding: 4vmin 6vmin;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 10vh;
            min-height: 70px;
            background: rgba(30, 20, 10, 0.65);
            backdrop-filter: blur(3px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;  /* so clicks pass through if needed */
        }

        #room-title {
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: bold;
            text-shadow: 2px 2px 6px #000;
            color: #f7e8c0;
            margin: 0;
            pointer-events: auto;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            min-height: 6vh;
            background: rgba(40, 30, 20, 0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            box-sizing: border-box;
        }

        #room-description {
            font-size: clamp(0.95rem, 2.2vw, 1.3rem);
            text-shadow: 1px 1px 3px #000;
            color: #e8d9a0;
            margin: 0;
            text-align: center;
            flex: 1;
        }

        #ambience-toggle {
            margin-left: 12px;
            font-size: 1.4rem;
            padding: 6px 12px;
            background: rgba(100, 60, 20, 0.8);
            border: 1px solid #8a6537;
            border-radius: 8px;
            color: #f7e8c0;
            cursor: pointer;
        }

        #ambience-toggle:hover {
            background: rgba(140, 90, 30, 0.9);
        }

        #chat-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1vh 0;
        }

        #chat-container {
            width: 100%;
            max-width: 640px;           /* or 55ch / 70% — feels cozy */
            height: 100%;
            max-height: 68vh;           /* leaves room for header/footer */
            background: rgba(30, 20, 10, 0.35);
            border-radius: 12px;
            border: 1px solid rgba(140, 90, 30, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-log {
            flex: 1;
            background: rgba(245, 235, 200, 0.88);
            color: #2c1e0f;
            overflow-y: auto;
            padding: 16px;
            font-size: clamp(1rem, 2.4vw, 1.35rem);
            line-height: 1.5;
        }

        #chat-log::-webkit-scrollbar {
            width: 8px;
        }

        #chat-log::-webkit-scrollbar-thumb {
            background: #8a6537;
            border-radius: 4px;
        }

        #chat-inputs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(40, 30, 20, 0.6);
            border-top: 1px solid rgba(140, 90, 30, 0.5);
        }

        input {
            padding: 10px 14px;
            font-size: 1.1rem;
            border: 1px solid #8a6537;
            border-radius: 6px;
            background: rgba(255, 245, 220, 0.9);
            color: #2c1e0f;
        }

        input::placeholder {
            color: #6b5a3e;
        }

        button {
            padding: 10px;
            font-size: 1.15rem;
            background: #614727;
            color: #f7e8c0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.15s;
        }

        button:hover {
            background: #8a6537;
        }
    </style>
</head>
<body>



<div id="container">
    <div id="Main">
        <header>
    <div id="room-title">{{ room.name }}</div>
</header>
        <div id="chat-wrapper">
            <div id="chat-container">
                <div id="chat-log"></div>
                <div id="chat-inputs">
                    <input id="username" placeholder="Your name..." autocomplete="off">
                    <input id="message" placeholder="Type your message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                <footer>
    <div id="room-description">
        {{ room.description }}
        <button id="ambience-toggle">♪</button>
    </div>
</footer>
                </div>
            </div>
        </div>
    </div>
</div>



<script>
    const roomId = "{{ room.id }}";
    const roomAudio = {{ room.audio | tojson }};
</script>

<script src="/app/static/js/chat.js"></script>

</body>
</html>
