<!DOCTYPE html>
<html>
<head>
    <title>{{ room.name }}</title>
    <link rel="stylesheet" href="/app/static/css/room.css">
</head>

<body>

<header>
    <div id="room-title">{{ room.name }}</div>
</header>

<div id="container">
    <div id="Main">
        <div id="chat-wrapper">
            <div id="chat-container">
                <div id="chat-log"></div>
                <div id="chat-inputs">
                    <input id="username" placeholder="Your name..." autocomplete="off">
                    <input id="message" placeholder="Type your message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div id="room-description">
        {{ room.description }}
        <button id="ambience-toggle">♪</button>
    </div>
</footer>

<script>
    const roomId = "{{ room.id }}";
    const roomAudio = {{ room.audio | tojson }};
</script>

<script src="/app/static/js/chat.js"></script>

</body>
</html>
