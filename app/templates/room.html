<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ room.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/app/static/css/room.css">  <!-- keep if needed -->

</head>
<body>

<div id="container">
    <div id="Main">

        <header>
            <div id="room-title">{{ room.name }}</div>
        </header>

        <div id="chat-wrapper">
            <div id="chat-container">
                <div id="chat-log"></div>

                <div id="chat-inputs">
                    <input id="username" placeholder="Your name..." autocomplete="off">
                    <input id="message" placeholder="Type your message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <footer>
            <div id="room-description">
                {{ room.description }}
                <button id="ambience-toggle">♪</button>
            </div>
        </footer>

    </div>
</div>

<script>
    const roomId = "{{ room.id }}";
    const roomAudio = {{ room.audio | tojson }};
</script>

<script src="/app/static/js/chat.js"></script>

</body>
</html>
