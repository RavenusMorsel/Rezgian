<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezgian - Character Login</title>
    <link rel="stylesheet" href="/app/static/css/home.css">
</head>
<body>
    <!-- Character onboarding panel -->
    <main class="shell">
        <section class="panel">
            <h1>Rezgian</h1>
            <p class="tagline">Create a character, then continue with your token next time.</p>

            <div id="create-section" class="row">
                <input id="character-name" type="text" maxlength="64" placeholder="Character name">
                <button id="create-btn" type="button">Create Character</button>
            </div>

            <div class="row">
                <button id="continue-btn" type="button">Continue</button>
                <button id="show-token-btn" type="button">Export Character</button>
            </div>

            <div id="import-section" class="row token-row">
                <input id="import-token" type="text" placeholder="Paste token from another device">
                <button id="import-btn" type="button">Import Token</button>
            </div>

            <p id="status" aria-live="polite"></p>
        </section>
    </main>

    <!-- Token export modal for cross-device login -->
    <div id="token-modal" class="token-modal" hidden>
        <div class="token-card" role="dialog" aria-modal="true" aria-labelledby="token-modal-title">
            <div class="token-card-header">
                <h2 id="token-modal-title">Character Export</h2>
                <button id="close-token-modal" type="button" class="token-close" aria-label="Close export panel">x</button>
            </div>
            <p class="token-help">Scan this QR code on mobile or copy the token text below.</p>
            <div id="token-qr" class="token-qr" aria-label="Character token QR code"></div>
            <label class="token-label" for="token-output">Character token</label>
            <textarea id="token-output" readonly spellcheck="false"></textarea>
            <div class="row token-actions">
                <button id="copy-token-btn" type="button">Copy Token</button>
                <button id="close-token-btn" type="button">Done</button>
            </div>
        </div>
    </div>

    <!-- QR helper and page logic -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="/app/static/js/home.js"></script>
</body>
</html>
